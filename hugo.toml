baseURL = 'https://latent-arch.com/'
languageCode = 'en-us'
title = 'Latent Arch'
theme = 'PaperMod'

[params]
  # Явно, иначе Hugo берёт секцию с наибольшим числом страниц (стала ai-news,
  # чьи карточки исключены из глобальных списков) — и главная остаётся пустой
  mainSections = ['posts']
  author = 'Denis Ilguzin'
  description = 'Software Architect · Engineering Leader · AI Engineering · 20 years in tech'
  ShowReadingTime = true
  ShowToc = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowShareButtons = false
  ShowCodeCopyButtons = true
  defaultTheme = 'auto'
  disableThemeToggle = false

  [params.footer]
    text = '[Telegram Terms](/telegram-terms/)'

  [params.assets]
    favicon = '/favicon.ico'
    favicon16x16 = '/favicon-16x16.png'
    favicon32x32 = '/favicon-32x32.png'
    apple_touch_icon = '/apple-touch-icon.png'
    safari_pinned_tab = '/favicon.svg'

  [params.homeInfoParams]
    Title = 'Latent Arch'

[menu]
  [[menu.main]]
    identifier = 'about'
    name = 'About'
    url = '/about/'
    weight = 10

  [[menu.main]]
    identifier = 'projects'
    name = 'Projects'
    url = '/projects/'
    weight = 20

  [[menu.main]]
    identifier = 'blog'
    name = 'Blog'
    url = '/posts/'
    weight = 30

  [[menu.main]]
    identifier = 'ai-news'
    name = 'AI News'
    url = '/ai-news/'
    weight = 40

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    # Классы вместо инлайн-стилей: палитра задаётся в custom.css (стиль TM)
    noClasses = false
    lineNos = false

[services]
  [services.googleAnalytics]
    ID = 'G-W08SB16PB0'
