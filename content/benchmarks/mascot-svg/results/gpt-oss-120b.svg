<svg xmlns="http://www.w3.org/2000/svg"
     width="800" height="600"
     viewBox="0 0 800 600"
     style="background:#f0f0f0">

  <!-- ==================== Cello ==================== -->
  <g id="cello" transform="translate(250,50)">
    <!-- Body (curved shape) -->
    <path d="
        M 0 0
        c -40 50 -40 250 0 300      <!-- left curve -->
        c 40 30 240 30 280 0        <!-- bottom curve -->
        c 40 -50 40 -250 0 -300     <!-- right curve -->
        Z"
        fill="#5c3a21"
        stroke="none"/>
    <!-- Endpin -->
    <line x1="140" y1="310" x2="140" y2="380"
          stroke="#333" stroke-width="4"/>
    <!-- Bridge -->
    <rect x="120" y="150" width="40" height="12"
          fill="#222" rx="3"/>
    <!-- Four strings -->
    <line x1="125" y1="0"   x2="125" y2="310"
          stroke="#bbb" stroke-width="1.5"/>
    <line x1="135" y1="0"   x2="135" y2="310"
          stroke="#bbb" stroke-width="1.5"/>
    <line x1="145" y1="0"   x2="145" y2="310"
          stroke="#bbb" stroke-width="1.5"/>
    <line x1="155" y1="0"   x2="155" y2="310"
          stroke="#bbb" stroke-width="1.5"/>
    <!-- F‑holes (stylised) -->
    <path d="M 70 100 q 15 -20 30 0 q -15 20 -30 0"
          fill="none" stroke="#111" stroke-width="6"/>
    <path d="M 210 130 q 10 -15 25 0 q -10 15 -25 0"
          fill="none" stroke="#111" stroke-width="6"/>
  </g>

  <!-- ==================== Walrus ==================== -->
  <g id="walrus" transform="translate(400,280)">
    <!-- Body (rounded rectangle) -->
    <rect x="-120" y="-80" width="240" height="160"
          rx="40" ry="40"
          fill="#777" stroke="none"/>
    <!-- Head -->
    <circle cx="0" cy="-110" r="70"
            fill="#777" stroke="none"/>
    <!-- Tusks -->
    <path d="M -30 -130 C -80 -160 -80 -180 -30 -190"
          fill="none" stroke="#fff" stroke-width="12" stroke-linecap="round"/>
    <path d="M  30 -130 C  80 -160  80 -180  30 -190"
          fill="none" stroke="#fff" stroke-width="12" stroke-linecap="round"/>
    <!-- Eyes -->
    <circle cx="-25" cy="-120" r="8" fill="#000"/>
    <circle cx=" 25" cy="-120" r="8" fill="#000"/>
    <!-- Whiskers (left) -->
    <line x1="-70" y1="-95" x2="-120" y2="-80"
          stroke="#fff" stroke-width="4"/>
    <line x1="-70" y1="-85" x2="-120" y2="-70"
          stroke="#fff" stroke-width="4"/>
    <line x1="-70" y1="-75" x2="-120" y2="-60"
          stroke="#fff" stroke-width="4"/>
    <!-- Whiskers (right) -->
    <line x1=" 70" y1="-95" x2=" 120" y2="-80"
          stroke="#fff" stroke-width="4"/>
    <line x1=" 70" y1="-85" x2=" 120" y2="-70"
          stroke="#fff" stroke-width="4"/>
    <line x1=" 70" y1="-75" x2=" 120" y2="-60"
          stroke="#fff" stroke-width="4"/>

    <!-- Flipper holding the bow -->
    <g id="flipper" transform="translate(-110,-30) rotate(-30)">
      <!-- Flipper shape -->
      <ellipse cx="0" cy="0" rx="45" ry="25"
               fill="#777" stroke="none"/>
      <!-- Bow -->
      <line x1="-30" y1="-10" x2="30" y2="10"
            stroke="#8b4513" stroke-width="5" stroke-linecap="round"/>
      <!-- Bow tip (small oval) -->
      <ellipse cx="30" cy="10" rx="5" ry="3"
               fill="#8b4513"/>
    </g>

    <!-- Front flipper (right) – just a simple pad -->
    <ellipse cx="100" cy="20"
             rx="30" ry="15"
             fill="#777" stroke="none"/>
  </g>

  <!-- ==================== Ground line ==================== -->
  <line x1="0" y1="470" x2="800" y2="470"
        stroke="#999" stroke-width="2"/>
</svg>