<svg xmlns="http://www.w3.org/2000/svg" width="900" height="700" viewBox="0 0 900 700" role="img" aria-labelledby="title desc">
  <title id="title">Walrus playing a cello</title>
  <desc id="desc">A whiskered walrus with two long tusks draws a bow across the four strings of an upright cello with a curved body, two f-holes, bridge, and endpin.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dff5f7"/>
      <stop offset="1" stop-color="#f7ecd2"/>
    </linearGradient>
    <linearGradient id="fur" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9a654f"/>
      <stop offset="1" stop-color="#684237"/>
    </linearGradient>
    <linearGradient id="celloWood" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d9862f"/>
      <stop offset=".48" stop-color="#a9471d"/>
      <stop offset="1" stop-color="#712811"/>
    </linearGradient>
    <linearGradient id="tusk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffdf0"/>
      <stop offset="1" stop-color="#e7d7a9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" fill="url(#bg)"/>
  <ellipse cx="477" cy="635" rx="330" ry="30" fill="#59453c" opacity=".18" filter="url(#shadow)"/>
  <path d="M0 590 Q180 565 350 594 T700 584 T900 592 V700 H0Z" fill="#ead8b7"/>

  <!-- Walrus body behind the instrument -->
  <ellipse cx="310" cy="475" rx="190" ry="145" fill="url(#fur)" stroke="#4f332c" stroke-width="7"/>
  <path d="M174 490 Q125 535 153 592 Q181 624 224 586 Q191 568 200 530Z"
        fill="#754a3d" stroke="#4f332c" stroke-width="7"/>
  <path d="M338 566 Q302 622 364 630 Q425 634 437 600 Q396 603 377 558Z"
        fill="#754a3d" stroke="#4f332c" stroke-width="7"/>

  <!-- Head -->
  <ellipse cx="286" cy="253" rx="132" ry="120" fill="url(#fur)" stroke="#4f332c" stroke-width="7"/>
  <ellipse cx="235" cy="230" rx="11" ry="14" fill="#201b1a"/>
  <ellipse cx="327" cy="225" rx="11" ry="14" fill="#201b1a"/>
  <circle cx="231" cy="226" r="3.5" fill="#fff"/>
  <circle cx="323" cy="221" r="3.5" fill="#fff"/>
  <path d="M221 202 Q236 191 252 201" fill="none" stroke="#4a3029" stroke-width="6" stroke-linecap="round"/>
  <path d="M306 197 Q323 186 340 198" fill="none" stroke="#4a3029" stroke-width="6" stroke-linecap="round"/>

  <!-- Muzzle and nose -->
  <ellipse cx="259" cy="286" rx="67" ry="48" fill="#b98067" stroke="#674439" stroke-width="5"/>
  <ellipse cx="313" cy="282" rx="65" ry="48" fill="#b98067" stroke="#674439" stroke-width="5"/>
  <ellipse cx="286" cy="257" rx="33" ry="23" fill="#3d2824"/>
  <path d="M286 276 Q284 291 270 300 M286 276 Q290 291 304 299"
        fill="none" stroke="#4d3029" stroke-width="5" stroke-linecap="round"/>

  <!-- Two long tusks -->
  <path d="M243 300 C239 345 242 391 260 432 C268 450 276 447 278 428 C279 382 272 335 263 299Z"
        fill="url(#tusk)" stroke="#b7a77e" stroke-width="4"/>
  <path d="M311 298 C314 346 311 394 294 436 C287 454 278 451 277 431 C277 382 284 335 291 298Z"
        fill="url(#tusk)" stroke="#b7a77e" stroke-width="4"/>

  <!-- Visible whiskers -->
  <g fill="none" stroke="#f4ead9" stroke-width="3" stroke-linecap="round">
    <path d="M230 279 Q171 260 129 264"/>
    <path d="M227 290 Q165 284 119 300"/>
    <path d="M230 303 Q170 310 127 335"/>
    <path d="M338 277 Q394 255 432 260"/>
    <path d="M341 289 Q402 283 447 300"/>
    <path d="M339 302 Q396 310 438 337"/>
  </g>
  <g fill="#594039">
    <circle cx="231" cy="276" r="3"/><circle cx="219" cy="286" r="3"/><circle cx="232" cy="297" r="3"/>
    <circle cx="339" cy="275" r="3"/><circle cx="351" cy="286" r="3"/><circle cx="338" cy="298" r="3"/>
  </g>

  <!-- Flipper reaching toward the neck -->
  <path d="M397 338 Q420 285 475 245 Q500 231 515 253 Q526 274 495 289
           Q456 310 433 362 Q420 386 398 372Z"
        fill="#815344" stroke="#4f332c" stroke-width="7"/>
  <path d="M487 244 q21 -15 35 2 M495 254 q22 -10 31 7"
        fill="none" stroke="#58382f" stroke-width="4" stroke-linecap="round"/>

  <!-- Cello pegbox and scroll -->
  <path d="M509 118 Q523 96 544 109 Q557 120 548 135 Q541 146 527 141
           Q513 138 518 126 Q522 117 532 122"
        fill="none" stroke="#64240f" stroke-width="13" stroke-linecap="round"/>
  <path d="M507 136 Q525 126 544 138 L540 201 L511 201Z"
        fill="#813417" stroke="#54200f" stroke-width="5"/>
  <g fill="#4b2115" stroke="#30150e" stroke-width="3">
    <path d="M510 150 l-27 -10 q-10 -4 -12 7 q0 9 11 10 l28 4Z"/>
    <path d="M542 158 l27 -10 q10 -4 12 7 q0 9 -11 10 l-28 4Z"/>
    <path d="M510 177 l-25 9 q-10 4 -7 13 q4 8 14 3 l19 -10Z"/>
    <path d="M542 181 l25 10 q10 4 6 13 q-4 8 -14 3 l-18 -11Z"/>
  </g>

  <!-- Neck and fingerboard -->
  <rect x="513" y="187" width="28" height="151" rx="8" fill="#7e3217" stroke="#54200f" stroke-width="5"/>
  <path d="M505 185 L548 185 L559 393 L494 393Z"
        fill="#2d211e" stroke="#1d1614" stroke-width="5"/>

  <!-- Cello curved body -->
  <path d="M526 304
           C487 292 455 311 458 348
           C460 370 480 378 469 399
           C459 418 426 427 418 468
           C407 522 436 568 483 581
           C500 586 516 582 526 574
           C537 582 553 586 570 581
           C617 568 646 522 635 468
           C627 427 594 418 583 399
           C572 378 592 370 594 348
           C597 311 565 292 526 304Z"
        fill="url(#celloWood)" stroke="#57200f" stroke-width="8"/>

  <!-- Cello edge highlight -->
  <path d="M486 313 Q463 329 468 351 M450 451 Q427 502 458 545
           M566 313 Q589 329 584 351 M602 451 Q625 502 594 545"
        fill="none" stroke="#e9a24e" stroke-width="4" opacity=".65" stroke-linecap="round"/>

  <!-- Tailpiece -->
  <path d="M499 489 Q526 477 553 489 L544 565 Q526 577 508 565Z"
        fill="#2f211e" stroke="#1a1210" stroke-width="4"/>

  <!-- Bridge -->
  <path d="M482 442
           Q492 431 503 439
           L506 421 L546 421 L549 439
           Q560 431 570 442
           L565 457 L487 457Z"
        fill="#e3bd78" stroke="#8a642f" stroke-width="4"/>
  <path d="M500 444 Q506 450 512 444 M540 444 Q546 450 552 444"
        fill="none" stroke="#8a642f" stroke-width="3"/>

  <!-- Four strings -->
  <g fill="none" stroke-linecap="round">
    <path d="M518 137 L518 548" stroke="#e8e1d2" stroke-width="1.7"/>
    <path d="M523 136 L523 551" stroke="#d8cfbd" stroke-width="1.5"/>
    <path d="M529 136 L529 551" stroke="#c4baa8" stroke-width="1.5"/>
    <path d="M535 137 L535 548" stroke="#a99f91" stroke-width="1.8"/>
  </g>

  <!-- Two f-holes -->
  <g fill="#321711">
    <path d="M474 388
             C454 402 460 424 474 430
             C461 443 459 463 473 478
             C467 458 479 450 484 440
             C489 430 481 417 474 414
             C481 407 482 397 474 388Z"/>
    <circle cx="476" cy="390" r="6"/>
    <circle cx="470" cy="477" r="6"/>
    <path d="M578 388
             C598 402 592 424 578 430
             C591 443 593 463 579 478
             C585 458 573 450 568 440
             C563 430 571 417 578 414
             C571 407 570 397 578 388Z"/>
    <circle cx="576" cy="390" r="6"/>
    <circle cx="582" cy="477" r="6"/>
  </g>

  <!-- Endpin and floor contact -->
  <path d="M526 572 L526 638" stroke="#342b29" stroke-width="7" stroke-linecap="round"/>
  <path d="M517 638 L535 638" stroke="#24201f" stroke-width="7" stroke-linecap="round"/>

  <!-- Bowing flipper, in front of body -->
  <path d="M203 412 Q250 375 317 399 Q355 412 385 437
           Q400 454 384 472 Q367 488 346 469
           Q318 444 278 443 Q246 443 221 465
           Q198 471 185 452 Q180 429 203 412Z"
        fill="#835446" stroke="#4f332c" stroke-width="7"/>

  <!-- Flipper gripping bow -->
  <path d="M348 430 Q366 418 385 431 Q399 442 393 458 Q386 475 369 470
           Q348 463 339 449Z"
        fill="#946251" stroke="#4f332c" stroke-width="6"/>
  <path d="M356 439 Q371 433 386 444 M353 451 Q370 445 387 455"
        fill="none" stroke="#5d3b33" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Bow clearly crossing the strings -->
  <g transform="rotate(-11 525 432)">
    <path d="M337 426 L717 426" stroke="#5a2b18" stroke-width="9" stroke-linecap="round"/>
    <path d="M349 436 L707 436" stroke="#f2e7d2" stroke-width="4" stroke-linecap="round"/>
    <path d="M342 425 L350 442 L365 438 L362 424Z"
          fill="#261b18" stroke="#100d0c" stroke-width="3"/>
    <path d="M716 421 Q732 426 716 431Z" fill="#d7b06b" stroke="#76552c" stroke-width="3"/>
  </g>

  <!-- Small motion marks -->
  <g fill="none" stroke="#755245" stroke-width="4" stroke-linecap="round" opacity=".65">
    <path d="M674 374 q28 7 43 24"/>
    <path d="M684 358 q32 8 51 30"/>
  </g>
</svg>