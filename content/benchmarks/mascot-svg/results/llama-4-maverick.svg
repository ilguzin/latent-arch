<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400">
  <!-- Background -->
  <rect x="0" y="0" width="600" height="400" fill="#f0f0f0" />
  
  <!-- Cello -->
  <path d="M 250 150 C 200 100, 200 100, 150 150 L 150 300 C 150 350, 200 350, 250 300 Z" fill="#964B00" stroke="black" stroke-width="1" />
  <path d="M 250 150 L 350 150 C 400 100, 400 100, 450 150 L 450 300 C 400 350, 400 350, 350 300 Z" fill="#964B00" stroke="black" stroke-width="1" />
  <path d="M 150 150 L 150 300" stroke="#964B00" stroke-width="20" fill="none" />
  <path d="M 450 150 L 450 300" stroke="#964B00" stroke-width="20" fill="none" />
  <!-- F-holes -->
  <path d="M 210 220 C 220 210, 230 220, 240 230" fill="none" stroke="black" stroke-width="2" />
  <path d="M 240 230 C 250 240, 260 230, 270 220" fill="none" stroke="black" stroke-width="2" />
  <path d="M 360 220 C 350 210, 340 220, 330 230" fill="none" stroke="black" stroke-width="2" />
  <path d="M 330 230 C 320 240, 310 230, 300 220" fill="none" stroke="black" stroke-width="2" />
  <!-- Strings and Bridge -->
  <line x1="300" y1="150" x2="300" y2="300" stroke="black" stroke-width="1" />
  <line x1="305" y1="150" x2="305" y2="300" stroke="black" stroke-width="1" />
  <line x1="310" y1="150" x2="310" y2="300" stroke="black" stroke-width="1" />
  <line x1="315" y1="150" x2="315" y2="300" stroke="black" stroke-width="1" />
  <rect x="295" y="230" width="10" height="5" fill="black" />
  <!-- Endpin -->
  <line x1="300" y1="300" x2="300" y2="350" stroke="black" stroke-width="5" />
  
  <!-- Walrus -->
  <ellipse cx="100" cy="250" rx="80" ry="60" fill="#999999" stroke="black" stroke-width="2" />
  <!-- Tusks -->
  <path d="M 80 220 L 60 200" stroke="#ffffff" stroke-width="8" fill="none" />
  <path d="M 120 220 L 140 200" stroke="#ffffff" stroke-width="8" fill="none" />
  <!-- Whiskers -->
  <line x1="100" y1="250" x2="120" y2="260" stroke="#ffffff" stroke-width="2" />
  <line x1="100" y1="250" x2="80" y2="260" stroke="#ffffff" stroke-width="2" />
  <line x1="100" y1="240" x2="120" y2="240" stroke="#ffffff" stroke-width="2" />
  <line x1="100" y1="240" x2="80" y2="240" stroke="#ffffff" stroke-width="2" />
  
  <!-- Flipper holding the bow -->
  <path d="M 80 280 L 150 180" stroke="#999999" stroke-width="10" fill="none" stroke-linecap="round" />
  <!-- Bow -->
  <line x1="150" y1="180" x2="220" y2="200" stroke="brown" stroke-width="5" />
  <!-- Action of drawing the bow -->
  <!-- The bow is already positioned to imply the action -->
  
</svg>